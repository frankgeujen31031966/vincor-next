              { name: description, label: Beschrijving, widget: text },
              { name: buttonText, label: Button tekst, widget: string },
              { name: buttonLink, label: Button link, widget: string }
            ]}

      - name: diagnostiek
        label: Diagnostiek
        file: content/nl/diagnostiek.json
        fields: &diagnostiek-page-fields
          - { name: hero, label: Hero, widget: object, fields: [
