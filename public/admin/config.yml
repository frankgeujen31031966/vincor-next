      - name: contact
        label: Contact
        file: content/nl/contact.json
        fields: &contact-fields
          - { name: hero, label: Hero, widget: object, fields: [
              { name: breadcrumb, label: Breadcrumb, widget: list, field: { name: item, label: Item, widget: string } },
              { name: title, label: Titel, widget: string },
              { name: titleHighlight, label: Highlight, widget: string, required: false },
              { name: description, label: Beschrijving, widget: text }
