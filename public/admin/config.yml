backend:
  name: github
  repo: frankgeujen31031966/vincor-next
  branch: master
  base_url: https://vincor-oauth.vincor.workers.dev
  auth_endpoint: auth

media_folder: public/images
public_folder: /images

locale: nl

collections:
  # ── Klachten (NL) ──
  - name: klachten-nl
    label: "Klachten (NL)"
    label_singular: Klacht
    folder: content/nl/klachten
    format: json
    create: false
    identifier_field: hero.title
    fields: &klachten-fields
      - { name: hero, label: Hero, widget: object, fields: [
          { name: breadcrumb, label: Breadcrumb, widget: list, field: { name: item, label: Item, widget: string } },
          { name: title, label: Titel, widget: string },
          { name: description, label: Beschrijving, widget: text }
        ]}
      - { name: watIsHet, label: Wat is het, widget: object, fields: [
          { name: label, label: Label, widget: string },
          { name: title, label: Titel, widget: string },
          { name: paragraphs, label: Paragrafen, widget: list, field: { name: text, label: Tekst, widget: text } },
          { name: image, label: Afbeelding, widget: image }
        ]}
      - { name: symptomen, label: Symptomen, widget: object, fields: [
          { name: title, label: Titel, widget: string },
          { name: description, label: Beschrijving, widget: text },
          { name: items, label: Items, widget: list, field: { name: item, label: Symptoom, widget: string } }
        ]}
      - { name: oorzaken, label: Oorzaken, widget: object, fields: [
          { name: label, label: Label, widget: string },
          { name: title, label: Titel, widget: string },
          { name: paragraphs, label: Paragrafen, widget: list, field: { name: text, label: Tekst, widget: text } },
          { name: image, label: Afbeelding, widget: image }
        ]}
      - { name: diagnostiek, label: Diagnostiek, widget: object, fields: [
          { name: title, label: Titel, widget: string },
          { name: description, label: Beschrijving, widget: text },
          { name: cards, label: Kaarten, widget: list, fields: [
            { name: title, label: Titel, widget: string },
            { name: description, label: Beschrijving, widget: text }
          ]}
        ]}
      - { name: behandeling, label: Behandeling, widget: object, fields: [
          { name: title, label: Titel, widget: string },
          { name: description, label: Beschrijving, widget: text },
          { name: phases, label: Fasen, widget: list, fields: [
            { name: phase, label: Fase, widget: string },
            { name: title, label: Titel, widget: string },
            { name: description, label: Beschrijving, widget: text },
            { name: features, label: Kenmerken, widget: list, field: { name: feature, label: Kenmerk, widget: string } },
            { name: featured, label: Uitgelicht, widget: boolean, default: false },
            { name: badge, label: Badge, widget: string, required: false }
          ]}
        ]}
      - { name: faq, label: FAQ, widget: object, fields: [
          { name: title, label: Titel, widget: string },
          { name: items, label: Items, widget: list, fields: [
            { name: question, label: Vraag, widget: string },
            { name: answer, label: Antwoord, widget: text }
          ]}
        ]}
      - { name: cta, label: CTA, widget: object, fields: [
          { name: title, label: Titel, widget: string },
          { name: description, label: Beschrijving, widget: text },
          { name: buttonText, label: Button tekst, widget: string },
          { name: buttonHref, label: Button link, widget: string }
        ]}

  - name: klachten-en
    label: "Klachten (EN)"
    label_singular: Complaint
    folder: content/en/klachten
    format: json
    create: false
    identifier_field: hero.title
    fields: *klachten-fields

  - name: klachten-fr
    label: "Klachten (FR)"
    label_singular: Plainte
    folder: content/fr/klachten
    format: json
    create: false
    identifier_field: hero.title
    fields: *klachten-fields

  # ── Behandeling (NL) ──
  - name: behandeling-nl
    label: "Behandeling (NL)"
    label_singular: Behandelfase
    folder: content/nl/behandeling
    format: json
    create: false
    identifier_field: hero.title
    fields: &behandeling-fields
      - { name: hero, label: Hero, widget: object, fields: [
          { name: breadcrumb, label: Breadcrumb, widget: list, field: { name: item, label: Item, widget: string } },
          { name: title, label: Titel, widget: string },
          { name: titleHighlight, label: Highlight, widget: string, required: false },
          { name: description, label: Beschrijving, widget: text }
        ]}
      - { name: intro, label: Introductie, widget: object, fields: [
          { name: sectionLabel, label: Label, widget: string },
          { name: title, label: Titel, widget: string },
          { name: paragraphs, label: Paragrafen, widget: list, field: { name: text, label: Tekst, widget: text } },
          { name: image, label: Afbeelding, widget: string },
          { name: imageAlt, label: Alt tekst, widget: string }
        ]}
      - { name: cta, label: CTA, widget: object, fields: [
          { name: title, label: Titel, widget: string },
          { name: description, label: Beschrijving, widget: text },
          { name: buttonText, label: Button tekst, widget: string },
          { name: buttonLink, label: Button link, widget: string }
        ]}

  - name: behandeling-en
    label: "Behandeling (EN)"
    folder: content/en/behandeling
    format: json
    create: false
    identifier_field: hero.title
    fields: *behandeling-fields

  - name: behandeling-fr
    label: "Behandeling (FR)"
    folder: content/fr/behandeling
    format: json
    create: false
    identifier_field: hero.title
    fields: *behandeling-fields

  # ── Kennisbank (NL) ──
  - name: kennisbank-nl
    label: "Kennisbank (NL)"
    label_singular: Artikel
    folder: content/nl/kennisbank
    format: json
    create: true
    identifier_field: hero.title
    fields: &kennisbank-fields
      - { name: hero, label: Hero, widget: object, fields: [
          { name: breadcrumb, label: Breadcrumb, widget: list, field: { name: item, label: Item, widget: string } },
          { name: title, label: Titel, widget: string },
          { name: titleHighlight, label: Highlight, widget: string, required: false },
          { name: description, label: Beschrijving, widget: text }
        ]}
      - { name: meta, label: Meta, widget: object, fields: [
          { name: category, label: Categorie, widget: string },
          { name: readingTime, label: Leestijd, widget: string },
          { name: publishDate, label: Publicatiedatum, widget: string }
        ]}
      - { name: featuredImage, label: Uitgelichte afbeelding, widget: object, required: false, fields: [
          { name: src, label: Afbeelding, widget: string },
          { name: alt, label: Alt tekst, widget: string }
        ]}
      - { name: body, label: Inhoud, widget: list, types: [
          { name: intro, label: Intro, widget: object, fields: [
            { name: type, label: Type, widget: hidden, default: intro },
            { name: text, label: Tekst, widget: text }
          ]},
          { name: paragraph, label: Paragraaf, widget: object, fields: [
            { name: type, label: Type, widget: hidden, default: paragraph },
            { name: text, label: Tekst, widget: text }
          ]},
          { name: heading, label: Kop, widget: object, fields: [
            { name: type, label: Type, widget: hidden, default: heading },
            { name: level, label: Niveau, widget: select, options: ['2', '3', '4'] },
            { name: text, label: Tekst, widget: string }
          ]},
          { name: list, label: Lijst, widget: object, fields: [
            { name: type, label: Type, widget: hidden, default: list },
            { name: items, label: Items, widget: list, field: { name: item, label: Item, widget: string } }
          ]}
        ]}
      - { name: cta, label: CTA, widget: object, fields: [
          { name: title, label: Titel, widget: string },
          { name: description, label: Beschrijving, widget: text },
          { name: buttonText, label: Button tekst, widget: string },
          { name: buttonLink, label: Button link, widget: string }
        ]}

  - name: kennisbank-en
    label: "Kennisbank (EN)"
    folder: content/en/kennisbank
    format: json
    create: true
    identifier_field: hero.title
    fields: *kennisbank-fields

  - name: kennisbank-fr
    label: "Kennisbank (FR)"
    folder: content/fr/kennisbank
    format: json
    create: true
    identifier_field: hero.title
    fields: *kennisbank-fields

  # ── Homepage ──
  - name: homepage
    label: "Homepage"
    files:
      - name: homepage-nl
        label: "Homepage (NL)"
        file: content/nl/homepage.json
        fields: &homepage-fields
          - { name: meta, label: Meta, widget: object, fields: [
              { name: title, label: Titel, widget: string },
              { name: description, label: Beschrijving, widget: text }
            ]}
          - { name: hero, label: Hero, widget: object, fields: [
              { name: badge, label: Badge, widget: string },
              { name: title, label: Titel, widget: string },
              { name: titleHighlight, label: Highlight, widget: string },
              { name: titleAfter, label: Titel na highlight, widget: string },
              { name: subtitle, label: Ondertitel, widget: text },
              { name: ctaPrimary, label: Primaire CTA, widget: object, fields: [
                { name: text, label: Tekst, widget: string },
                { name: href, label: Link, widget: string }
              ]},
              { name: ctaSecondary, label: Secundaire CTA, widget: object, fields: [
                { name: text, label: Tekst, widget: string },
                { name: href, label: Link, widget: string }
              ]},
              { name: stats, label: Statistieken, widget: list, fields: [
                { name: number, label: Nummer, widget: string },
                { name: label, label: Label, widget: string }
              ]},
              { name: scrollIndicator, label: Scroll tekst, widget: string }
            ]}
          - { name: trustBar, label: Trust bar, widget: list, field: { name: item, label: Item, widget: string } }
          - { name: klachten, label: Klachten sectie, widget: object, fields: [
              { name: label, label: Label, widget: string },
              { name: title, label: Titel, widget: string },
              { name: description, label: Beschrijving, widget: text },
              { name: items, label: Items, widget: list, fields: [
                { name: title, label: Titel, widget: string },
                { name: image, label: Afbeelding, widget: string },
                { name: slug, label: Slug, widget: string }
              ]}
            ]}
          - { name: howItWorks, label: Hoe werkt het, widget: object, fields: [
              { name: label, label: Label, widget: string },
              { name: title, label: Titel, widget: string },
              { name: description, label: Beschrijving, widget: text },
              { name: steps, label: Stappen, widget: list, fields: [
                { name: title, label: Titel, widget: string },
                { name: description, label: Beschrijving, widget: text }
              ]}
            ]}
          - { name: diagnostiek, label: Diagnostiek sectie, widget: object, fields: [
              { name: label, label: Label, widget: string },
              { name: title, label: Titel, widget: string },
              { name: description, label: Beschrijving, widget: text },
              { name: image, label: Afbeelding, widget: string },
              { name: imageAlt, label: Alt tekst, widget: string },
              { name: features, label: Features, widget: list, field: { name: feature, label: Feature, widget: string } },
              { name: ctaText, label: CTA tekst, widget: string },
              { name: ctaHref, label: CTA link, widget: string }
            ]}
          - { name: behandeling, label: Behandeling sectie, widget: object, fields: [
              { name: label, label: Label, widget: string },
              { name: title, label: Titel, widget: string },
              { name: description, label: Beschrijving, widget: text },
              { name: phases, label: Fasen, widget: list, fields: [
                { name: phase, label: Fase, widget: string },
                { name: title, label: Titel, widget: string },
                { name: price, label: Prijs, widget: string },
                { name: description, label: Beschrijving, widget: text },
                { name: features, label: Features, widget: list, field: { name: feature, label: Feature, widget: string } },
                { name: slug, label: Slug, widget: string },
                { name: location, label: Locatie, widget: string },
                { name: featured, label: Uitgelicht, widget: boolean, default: false },
                { name: badge, label: Badge, widget: string, required: false },
                { name: ctaText, label: CTA tekst, widget: string }
              ]}
            ]}
          - { name: resultaten, label: Resultaten sectie, widget: object, fields: [
              { name: label, label: Label, widget: string },
              { name: title, label: Titel, widget: string },
              { name: description, label: Beschrijving, widget: text },
              { name: stats, label: Statistieken, widget: list, fields: [
                { name: target, label: Doel, widget: number },
                { name: suffix, label: Suffix, widget: string },
                { name: label, label: Label, widget: string }
              ]}
            ]}
          - { name: partners, label: Partners sectie, widget: object, fields: [
              { name: label, label: Label, widget: string },
              { name: title, label: Titel, widget: string },
              { name: paragraphs, label: Paragrafen, widget: list, field: { name: text, label: Tekst, widget: text } },
              { name: image, label: Afbeelding, widget: string },
              { name: imageAlt, label: Alt tekst, widget: string }
            ]}
          - { name: googleReviews, label: Google Reviews, widget: object, fields: [
              { name: label, label: Label, widget: string },
              { name: title, label: Titel, widget: string },
              { name: overallRating, label: Gemiddelde score, widget: number, value_type: float },
              { name: totalReviews, label: Totaal reviews tekst, widget: string },
              { name: items, label: Reviews, widget: list, fields: [
                { name: stars, label: Sterren, widget: number },
                { name: timeAgo, label: Tijd geleden, widget: string },
                { name: text, label: Tekst, widget: text },
                { name: author, label: Auteur, widget: string },
                { name: initial, label: Initiaal, widget: string }
              ]}
            ]}
          - { name: testimonials, label: Testimonials, widget: object, fields: [
              { name: label, label: Label, widget: string },
              { name: title, label: Titel, widget: string },
              { name: items, label: Verhalen, widget: list, fields: [
                { name: text, label: Tekst, widget: text },
                { name: name, label: Naam, widget: string },
                { name: role, label: Rol, widget: string },
                { name: avatar, label: Avatar, widget: string }
              ]}
            ]}
          - { name: cta, label: CTA, widget: object, fields: [
              { name: title, label: Titel, widget: string },
              { name: description, label: Beschrijving, widget: text },
              { name: buttonText, label: Button tekst, widget: string },
              { name: buttonLink, label: Button link, widget: string }
            ]}

      - name: homepage-en
        label: "Homepage (EN)"
        file: content/en/homepage.json
        fields: *homepage-fields

      - name: homepage-fr
        label: "Homepage (FR)"
        file: content/fr/homepage.json
        fields: *homepage-fields

  # ── Navigation ──
  - name: navigation
    label: "Navigatie"
    files:
      - name: navigation-nl
        label: "Navigatie (NL)"
        file: content/nl/navigation.json
        fields: &navigation-fields
          - { name: nav, label: Menu items, widget: list, fields: [
              { name: label, label: Label, widget: string },
              { name: href, label: Link, widget: string },
              { name: children, label: Submenu, widget: list, required: false, fields: [
                { name: label, label: Label, widget: string },
                { name: href, label: Link, widget: string }
              ]}
            ]}
          - { name: cta, label: CTA knop tekst, widget: string }
          - { name: footer, label: Footer, widget: object, fields: [
              { name: description, label: Beschrijving, widget: text },
              { name: klachtenTitle, label: Klachten titel, widget: string },
              { name: behandelingTitle, label: Behandeling titel, widget: string },
              { name: contactTitle, label: Contact titel, widget: string },
              { name: behandelingLinks, label: Behandeling links, widget: list, fields: [
                { name: label, label: Label, widget: string },
                { name: href, label: Link, widget: string }
              ]},
              { name: privacy, label: Privacy tekst, widget: string },
              { name: terms, label: Voorwaarden tekst, widget: string },
              { name: cookieSettings, label: "Cookievoorkeuren tekst", widget: string },
              { name: contact, label: "Contactgegevens footer", widget: object, fields: [
                { name: city, label: Stad, widget: string },
                { name: phone, label: "Telefoon (weergave)", widget: string },
                { name: phoneHref, label: "Telefoon (tel: link)", widget: string },
                { name: email, label: "E-mailadres", widget: string }
              ]}
            ]}
          - { name: cookie, label: "Cookie banner", widget: object, fields: [
              { name: title, label: Titel, widget: string },
              { name: description, label: Beschrijving, widget: text },
              { name: acceptAll, label: "Alles accepteren knop", widget: string },
              { name: rejectAll, label: "Alleen essentieel knop", widget: string },
              { name: customize, label: "Aanpassen knop", widget: string },
              { name: save, label: "Opslaan knop", widget: string },
              { name: essential, label: "Categorie: Essentieel", widget: object, fields: [
                { name: label, label: Label, widget: string },
                { name: description, label: Beschrijving, widget: text }
              ]},
              { name: analytics, label: "Categorie: Statistieken", widget: object, fields: [
                { name: label, label: Label, widget: string },
                { name: description, label: Beschrijving, widget: text }
              ]},
              { name: maps, label: "Categorie: Google Maps", widget: object, fields: [
                { name: label, label: Label, widget: string },
                { name: description, label: Beschrijving, widget: text }
              ]}
            ]}

      - name: navigation-en
        label: "Navigatie (EN)"
        file: content/en/navigation.json
        fields: *navigation-fields

      - name: navigation-fr
        label: "Navigatie (FR)"
        file: content/fr/navigation.json
        fields: *navigation-fields

  # ── Team ──
  - name: team-nl
    label: "Team (NL)"
    folder: content/nl/team
    format: json
    create: false
    identifier_field: hero.title
    fields: &team-fields
      - { name: meta, label: Meta, widget: object, fields: [
          { name: title, label: Titel, widget: string },
          { name: description, label: Beschrijving, widget: text },
          { name: slug, label: Slug, widget: string }
        ]}
      - { name: hero, label: Hero, widget: object, fields: [
          { name: breadcrumb, label: Breadcrumb, widget: list, field: { name: item, label: Item, widget: string } },
          { name: title, label: Titel, widget: string },
          { name: titleHighlight, label: Highlight, widget: string, required: false },
          { name: description, label: Beschrijving, widget: text }
        ]}
      - { name: intro, label: Introductie, widget: object, fields: [
          { name: sectionLabel, label: Label, widget: string },
          { name: title, label: Titel, widget: string },
          { name: image, label: Afbeelding, widget: image },
          { name: imageAlt, label: Alt tekst, widget: string },
          { name: paragraphs, label: Paragrafen, widget: list, field: { name: text, label: Tekst, widget: text } }
        ]}
      - { name: expertise, label: Expertise, widget: object, fields: [
          { name: sectionLabel, label: Label, widget: string },
          { name: title, label: Titel, widget: string },
          { name: items, label: Items, widget: list, fields: [
            { name: title, label: Titel, widget: string },
            { name: description, label: Beschrijving, widget: text }
          ]}
        ]}
      - { name: approach, label: Werkwijze, widget: object, fields: [
          { name: sectionLabel, label: Label, widget: string },
          { name: title, label: Titel, widget: string },
          { name: paragraphs, label: Paragrafen, widget: list, field: { name: text, label: Tekst, widget: text } },
          { name: features, label: Features, widget: list, field: { name: feature, label: Feature, widget: string } }
        ]}
      - { name: credentials, label: Opleiding, widget: object, fields: [
          { name: sectionLabel, label: Label, widget: string },
          { name: title, label: Titel, widget: string },
          { name: items, label: Items, widget: list, field: { name: item, label: Item, widget: string } }
        ]}
      - { name: contact, label: Contact, widget: object, fields: [
