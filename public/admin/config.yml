              { name: titleHighlight, label: Highlight, widget: string, required: false },
              { name: description, label: Beschrijving, widget: text }
            ]}
          - { name: technology, label: Technologie, widget: object, fields: [
              { name: sectionLabel, label: Label, widget: string },
              { name: title, label: Titel, widget: string },
              { name: image, label: Afbeelding, widget: string },
              { name: imageAlt, label: Alt tekst, widget: string },
              { name: paragraphs, label: Paragrafen, widget: list, field: { name: text, label: Tekst, widget: text } }
            ]}
          - { name: benefits, label: Voordelen, widget: object, fields: [
              { name: sectionLabel, label: Label, widget: string },
              { name: title, label: Titel, widget: string },
              { name: description, label: Beschrijving, widget: text },
              { name: items, label: Items, widget: list, fields: [
                { name: title, label: Titel, widget: string },
                { name: description, label: Beschrijving, widget: text }
              ]}
